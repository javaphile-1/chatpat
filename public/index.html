<!DOCTYPE html>
<html>
<head>
<title>Simple Chat</title>
<style>
body{
font-family: Arial;
margin:40px;
}

#messages{
border:1px solid #ccc;
height:300px;
overflow-y:scroll;
padding:10px;
margin-bottom:10px;
}

input{
padding:10px;
width:80%;
}

button{
padding:10px;
}

<style id="mobile_chat_style">
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  max-width: 70%;
  word-wrap: break-word;
}

.myMessage {
  background: #d1e7dd;
  align-self: flex-end;
}

.otherMessage {
  background: white;
  align-self: flex-start;
}

#typing {
  font-size: 13px;
  color: gray;
  padding-left: 10px;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: white;
  border-top: 1px solid #ddd;
}

#messageInput {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

#sendButton {
  margin-left: 8px;
  padding: 10px 16px;
  border: none;
  background: #0d6efd;
  color: white;
  border-radius: 20px;
}
</style>
  
</style>
</head>

<body>

<h2>Simple Chat</h2>

<div id="messages"></div>
<div id="typing" style="color: gray; font-size: 14px;"></div>
<input id="messageInput" placeholder="Type message here">
<button>Send</button>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const username = prompt("Enter your name");
socket.emit("user joined", username);
const input = document.getElementById("messageInput");
input.addEventListener("input", () => {
  socket.emit("typing", username);
});
  const messages = document.getElementById("messages");
const button = document.querySelector("button");

button.addEventListener("click", () => {
  const message = input.value;

  socket.emit("chat message", {
  user: username,
  text: message
});

  input.value = "";
});

  socket.on("typing", (name) => {
  const typingDiv = document.getElementById("typing");
  typingDiv.innerText = name + " is typing...";

  setTimeout(() => {
    typingDiv.innerText = "";
  }, 2000);
});
  
socket.on("chat message", (msg) => {

  const messages = document.getElementById("messages");

  const messageDiv = document.createElement("div");
  messageDiv.classList.add("message");

  if (msg.user === username) {
    messageDiv.classList.add("myMessage");
  } else {
    messageDiv.classList.add("otherMessage");
  }

  messageDiv.innerText = msg.user + ": " + msg.text;

  messages.appendChild(messageDiv);

  messages.scrollTop = messages.scrollHeight;
});


  
</script>

<div id="messages"></div>

<div id="typing"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Type a message..." />
  <button id="sendButton">Send</button>
</div>

</body>
</html>
