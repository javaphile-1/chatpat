<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>
body { font-family: Arial; margin:0; display:flex; flex-direction:column; height:100vh;}

#videoArea {
  display:none;
  background:black;
  padding:5px;
}

video {
  width:48%;
  height:150px;
}

#callControls {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:5px;
}

.callBtn {
  padding:10px;
  border:none;
  border-radius:20px;
  background:#28a745;
  color:white;
}

.endBtn {
  background:red;
}

#messages {flex:1; overflow-y:auto; padding:10px;}
.message {padding:10px; margin:5px; border-radius:10px; max-width:70%;}
.myMessage {background:#dcf8c6; align-self:flex-end;}
.otherMessage {background:#fff;}

#inputArea {display:flex;}
#messageInput {flex:1; padding:10px;}
</style>

</head>

<body>

<div id="loginScreen">
<h2>Login</h2>
<input id="nameInput" placeholder="Name"><br><br>
<input id="codeInput" placeholder="Code"><br><br>
<button onclick="login()">Enter</button>
<p id="error"></p>
</div>

<div id="chatScreen" style="display:none; flex-direction:column; height:100vh;">

<div id="videoArea">
  <video id="localVideo" autoplay muted></video>
  <video id="remoteVideo" autoplay></video>

  <div id="callControls">
    <button class="endBtn" onclick="endCall()">End Call</button>
  </div>
</div>

<button class="callBtn" onclick="callUser()">📞 Call</button>

<div id="messages"></div>

<div id="inputArea">
<input id="messageInput">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const SECRET_CODE="8421";
let socket, username;
let peer, localStream;
let currentCallUser;

// LOGIN
function login(){
  if(codeInput.value!==SECRET_CODE) return error.innerText="Wrong code";
  if(!nameInput.value) return error.innerText="Enter name";

  username=nameInput.value;

  loginScreen.style.display="none";
  chatScreen.style.display="flex";

  startChat();
}

// CHAT
function startChat(){
  socket=io();

  socket.emit("user joined", username);

  socket.on("load messages", msgs=>msgs.forEach(addMessage));

  socket.on("chat message", msg=>{
    addMessage(msg);
    socket.emit("message seen", msg.id);
  });

  socket.on("typing", name=>{
    typing.innerText=name+" typing...";
    setTimeout(()=>typing.innerText="",2000);
  });

  socket.on("incoming-call", async ({from, offer})=>{
    currentCallUser=from;

    if(confirm(from+" is calling. Accept?")){
      await startMedia();
      createPeer();

      await peer.setRemoteDescription(offer);

      const answer=await peer.createAnswer();
      await peer.setLocalDescription(answer);

      socket.emit("answer-call",{to:from, answer});

      videoArea.style.display="block";
    }
  });

  socket.on("call-answered", async answer=>{
    await peer.setRemoteDescription(answer);
    videoArea.style.display="block";
  });

  socket.on("ice-candidate", async candidate=>{
    if(peer) await peer.addIceCandidate(candidate);
  });
}

// MESSAGE
function sendMessage(){
  if(!messageInput.value) return;

  socket.emit("chat message",{user:username,text:messageInput.value});
  messageInput.value="";
}

function addMessage(msg){
  let div=document.createElement("div");
  div.className="message "+(msg.user===username?"myMessage":"otherMessage");

  div.innerHTML=msg.user+": "+msg.text;
  messages.appendChild(div);
  messages.scrollTop=messages.scrollHeight;
}

// CALL
async function callUser(){

  let target=prompt("Enter username to call");
  if(!target) return;

  currentCallUser=target;

  await startMedia();
  createPeer();

  const offer=await peer.createOffer();
  await peer.setLocalDescription(offer);

  socket.emit("call-user",{to:target, offer});
}

async function startMedia(){
  localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  localVideo.srcObject=localStream;
}

function createPeer(){
  peer=new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(track=>{
    peer.addTrack(track, localStream);
  });

  peer.ontrack=e=>{
    remoteVideo.srcObject=e.streams[0];
  };

  peer.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("ice-candidate",{to:currentCallUser,candidate:e.candidate});
    }
  };
}

// END CALL
function endCall(){
  if(peer) peer.close();
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  videoArea.style.display="none";
}

</script>

</body>
</html>
