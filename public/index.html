<!DOCTYPE html>
<html>

<head>
<title>Private Chat</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#loginScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

#chatScreen {
  display: none;
  flex-direction: column;
  height: 100vh;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  max-width: 70%;
}

.myMessage {
  background: lightgreen;
  align-self: flex-end;
}

.otherMessage {
  background: lightgray;
}

#typing {
  font-size: 12px;
  color: gray;
  padding-left: 10px;
}

#inputArea {
  display: flex;
  padding: 5px;
}

#messageInput {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h2>Login</h2>
  <input id="nameInput" placeholder="Enter your name"><br><br>
  <input id="codeInput" placeholder="Enter code"><br><br>
  <button onclick="login()">Enter</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <h2>Private Chat</h2>

  <div id="messages"></div>
  <div id="typing"></div>

  <div id="inputArea">
    <input id="messageInput" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const SECRET_CODE = "8421";

let socket;
let username;

// 🔐 LOGIN
function login() {
  const code = document.getElementById("codeInput").value.trim();
  const name = document.getElementById("nameInput").value.trim();

  if (!name) {
    document.getElementById("error").innerText = "Enter your name";
    return;
  }

  if (code !== SECRET_CODE) {
    document.getElementById("error").innerText = "Wrong code";
    return;
  }

  username = name;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";

  startChat();
}

// 🚀 START CHAT
function startChat() {

  socket = io();

  const input = document.getElementById("messageInput");

  socket.emit("user joined", username);

  // Load old messages
  socket.on("load messages", (msgs) => {
    msgs.forEach(addMessage);
  });

  // Receive new message
  socket.on("chat message", (msg) => {
    addMessage(msg);
    socket.emit("message seen", msg.id);
  });

  // Seen indicator
  socket.on("message seen", (id) => {
    const el = document.getElementById("seen-" + id);
    if (el) el.innerText = "Seen";
  });

  // Typing indicator
  input.addEventListener("input", () => {
    socket.emit("typing", username);
  });

  socket.on("typing", (name) => {
    const typingDiv = document.getElementById("typing");
    typingDiv.innerText = name + " is typing...";

    setTimeout(() => {
      typingDiv.innerText = "";
    }, 2000);
  });

  // ✅ Enter key to send message
  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") {
      sendMessage();
    }
  });
}

// 📩 SEND MESSAGE
function sendMessage() {
  const input = document.getElementById("messageInput");

  if (!input.value.trim()) return;

  socket.emit("chat message", {
    user: username,
    text: input.value
  });

  input.value = "";
}

// 🧱 ADD MESSAGE TO UI
function addMessage(msg) {
  const messagesDiv = document.getElementById("messages");

  const div = document.createElement("div");
  div.classList.add("message");

  if (msg.user === username) {
    div.classList.add("myMessage");
  } else {
    div.classList.add("otherMessage");
  }

  // 🕒 Format timestamp safely
  let formattedTime = "";
  if (msg.time) {
    const date = new Date(msg.time);
    formattedTime = date.toLocaleString("en-IN", {
      day: "2-digit",
      month: "short",
      year: "numeric",
      hour: "2-digit",
      minute: "2-digit",
    });
  }

  div.innerHTML = `
    <b>${msg.user}:</b> ${msg.text}
    <div style="font-size:10px;color:gray;">
      ${formattedTime}
    </div>
    <div id="seen-${msg.id}" style="font-size:10px;color:gray;"></div>
  `;

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

</script>

</body>
</html>
