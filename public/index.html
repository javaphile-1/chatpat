<!DOCTYPE html>
<html>

<head>
<title>Simple Chat</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  margin:0;
  display:flex;
  flex-direction:column;
  height:100vh;
}

h2{
  text-align:center;
  margin:10px;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.message{
  padding:10px;
  margin:6px 0;
  border-radius:10px;
  max-width:70%;
  word-wrap:break-word;
}

.myMessage{
  background:#d1e7dd;
  margin-left:auto;
}

.otherMessage{
  background:white;
  margin-right:auto;
}

.systemMessage{
  text-align:center;
  color:gray;
  font-size:13px;
}

#typing{
  font-size:13px;
  color:gray;
  padding-left:10px;
}

#inputArea{
  display:flex;
  padding:10px;
  background:white;
  border-top:1px solid #ddd;
}

#messageInput{
  flex:1;
  padding:10px;
  border-radius:20px;
  border:1px solid #ccc;
}

#sendButton{
  margin-left:8px;
  padding:10px 16px;
  border:none;
  background:#0d6efd;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

</style>

</head>

<body>

<h2>Simple Chat</h2>

<div id="messages"></div>

<div id="typing"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Type a message..." />
  <button id="sendButton">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

const username = prompt("Enter your name");

socket.emit("user joined", username);

const input = document.getElementById("messageInput");
const button = document.getElementById("sendButton");
const messages = document.getElementById("messages");

input.addEventListener("input", () => {
  socket.emit("typing", username);
});

button.addEventListener("click", sendMessage);

input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    sendMessage();
  }
});

function sendMessage(){

  const message = input.value.trim();

  if(message === "") return;

  socket.emit("chat message", {
    user: username,
    text: message
  });

  input.value="";
}

socket.on("typing", (name) => {

  const typingDiv=document.getElementById("typing");

  typingDiv.innerText=name + " is typing...";

  setTimeout(()=>{
    typingDiv.innerText="";
  },2000);

});

socket.on("chat message", (msg) => {

  const messageDiv=document.createElement("div");

  if(msg.user === "System"){

    messageDiv.classList.add("systemMessage");
    messageDiv.innerText=msg.text;

  } else {

    messageDiv.classList.add("message");

    if(msg.user === username){
      messageDiv.classList.add("myMessage");
    } else {
      messageDiv.classList.add("otherMessage");
    }

    const time = new Date().toLocaleTimeString([],{
      hour:'2-digit',
      minute:'2-digit'
    });

    messageDiv.innerText = msg.user + " • " + time + "\n" + msg.text;
  }

  messages.appendChild(messageDiv);

  messages.scrollTop = messages.scrollHeight;

});

</script>

</body>
</html>
