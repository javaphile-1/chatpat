<!DOCTYPE html>
<html>

<head>
<title>Private Chat</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f2f2f2;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

h2 {
  text-align: center;
  margin: 10px;
}

#loginScreen {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#chatScreen {
  display: none;
  flex-direction: column;
  height: 100vh;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  max-width: 70%;
}

.myMessage {
  background: #d1e7dd;
  align-self: flex-end;
}

.otherMessage {
  background: white;
  align-self: flex-start;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: white;
}

#messageInput {
  flex: 1;
  padding: 10px;
}

#sendButton {
  padding: 10px;
}

</style>

</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h2>Enter Access Code</h2>
  <input id="codeInput" placeholder="Enter code">
  <button onclick="login()">Enter</button>
  <p id="error" style="color:red;"></p>
</div>

<!-- CHAT SCREEN -->
<div id="chatScreen">
  <h2>Private Chat</h2>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="messageInput" placeholder="Type message...">
    <button id="sendButton">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const SECRET_CODE = "221323"; // 🔐 CHANGE THIS ANYTIME

let username = "User";

function login() {
  const entered = document.getElementById("codeInput").value;

  if (entered === SECRET_CODE) {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("chatScreen").style.display = "flex";

    startChat();
  } else {
    document.getElementById("error").innerText = "Wrong code";
  }
}

function startChat() {

  const socket = io();

  const input = document.getElementById("messageInput");
  const button = document.getElementById("sendButton");
  const messages = document.getElementById("messages");

  socket.emit("user joined", username);

  button.addEventListener("click", () => {
    const message = input.value;

    socket.emit("chat message", {
      user: username,
      text: message
    });

    input.value = "";
  });

  socket.on("chat message", (msg) => {
    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message");

    if (msg.user === username) {
      messageDiv.classList.add("myMessage");
    } else {
      messageDiv.classList.add("otherMessage");
    }

    messageDiv.innerText = msg.user + ": " + msg.text;

    messages.appendChild(messageDiv);
    messages.scrollTop = messages.scrollHeight;
  });

}

</script>

</body>
</html>
