<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* LOGIN */
#login {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CHAT */
#chat {
  display:none;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
#header {
  background:#075e54;
  color:white;
  padding:16px;
  font-size:20px;
  display:flex;
  justify-content:space-between;
}

/* CALL BUTTONS */
#callBar {
  display:flex;
  gap:10px;
  padding:10px;
}

button {
  font-size:18px;
  padding:12px;
}

/* INPUT */
#inputArea {
  display:flex;
  padding:10px;
}

#messageInput {
  flex:1;
  padding:14px;
  font-size:18px;
}

/* VIDEO */
#videoScreen {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  top:0;
  left:0;
}

#remoteVideo {
  width:100%;
  height:100%;
}

#localVideo {
  position:absolute;
  width:150px;
  height:200px;
  bottom:120px;
  right:10px;
}

/* CALL POPUP */
#incomingCall {
  display:none;
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  font-size:18px;
}
</style>

</head>

<body>

<div id="loginScreen" style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;">

  <h2>Enter</h2>

  <input 
    id="codeInput" 
    type="password"
    placeholder="Input code"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    style="padding:14px;font-size:18px;width:200px;text-align:center;"
  >

  <br><br>

  <button onclick="login()" style="padding:12px 20px;font-size:18px;">
    Enter
  </button>

</div>

<div id="chat">

<div id="header">
  <span id="username"></span>
</div>

<div id="callBar">
  <button onclick="startCall('audio')">📞 Voice</button>
  <button onclick="startCall('video')">🎥 Video</button>
</div>

<div id="inputArea">
  <input id="messageInput">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<div id="incomingCall">
  <p id="callerText"></p>
  <button onclick="acceptCall()">Accept</button>
  <button onclick="rejectCall()">Reject</button>
</div>

<div id="videoScreen">
  <video id="remoteVideo" autoplay></video>
  <video id="localVideo" autoplay muted></video>
  <button onclick="endCall()">End</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const SECRET_CODE="8421";

let socket = io();
let username;
let peer, localStream;
let callType;
let incomingOffer;

// LOGIN
function login(){

  const code = document.getElementById("codeInput").value.trim();

  // NO validation message, silent check
  if(code === "2213"){
    username = "Tumaji";
  }
  else if(code === "1323"){
    username = "Rani";
  }
  else{
    return; // do nothing
  }

  // Initialize socket AFTER login
  socket = io();

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("chat").style.display = "flex";

  document.getElementById("username").innerText = username;

  socket.emit("user joined", username);
}

// CALL START
async function startCall(type){

  callType=type;

  if(type==="video"){
    localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  } else {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }

  createPeer();

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  let offer=await peer.createOffer();
  await peer.setLocalDescription(offer);

  socket.emit("call-user",{offer,type});

  showVideo();
}

// INCOMING CALL
socket.on("incoming-call", data=>{
  callType=data.type;
  incomingOffer=data.offer;

  callerText.innerText=data.from+" calling";
  incomingCall.style.display="block";
});

async function acceptCall(){

  incomingCall.style.display="none";

  if(callType==="video"){
    localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  } else {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }

  createPeer();

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  await peer.setRemoteDescription(incomingOffer);

  let answer=await peer.createAnswer();
  await peer.setLocalDescription(answer);

  socket.emit("call-accepted",{answer});

  showVideo();
}

function rejectCall(){
  incomingCall.style.display="none";
  socket.emit("call-rejected");
}

// CALL EVENTS
socket.on("call-answered", async answer=>{
  await peer.setRemoteDescription(answer);
});

socket.on("call-rejected", ()=>{
  alert("Call rejected");
});

// PEER
function createPeer(){
  peer=new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  peer.ontrack=e=>{
    remoteVideo.srcObject=e.streams[0];
  };

  peer.onicecandidate=e=>{
    if(e.candidate){
      socket.emit("ice-candidate",{candidate:e.candidate});
    }
  };
}

// VIDEO UI
function showVideo(){
  videoScreen.style.display="block";
  if(localStream) localVideo.srcObject=localStream;
}

function endCall(){
  if(peer) peer.close();
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  videoScreen.style.display="none";
}

</script>

</body>
</html>
