<!DOCTYPE html>
<html>
<head>
<title>Private Chat</title>

<style>

/* RESET */
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#ece5dd;
}

/* LOGIN */
#loginScreen {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CHAT CONTAINER */
#chat {
  display:none;
  flex-direction:column;
  height:100vh;
}

/* DESKTOP CENTER LAYOUT */
@media (min-width: 768px) {
  #chat {
    max-width:600px;
    margin:auto;
    border:1px solid #ccc;
    height:95vh;
  }
}

/* HEADER */
#header {
  background:#075e54;
  color:white;
  padding:16px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

/* CALL BAR */
#callBar {
  display:flex;
  gap:10px;
  padding:10px;
}

/* BUTTON */
button {
  border:none;
  border-radius:20px;
  background:#25d366;
  color:white;
  cursor:pointer;
}

/* MOBILE BUTTON SIZE */
button {
  font-size:18px;
  padding:12px 16px;
}

/* DESKTOP BUTTON SIZE */
@media (min-width:768px){
  button {
    font-size:14px;
    padding:8px 12px;
  }
}

/* MESSAGES */
#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* INPUT AREA */
#inputArea {
  display:flex;
  padding:10px;
  background:white;
}

#messageInput {
  flex:1;
  border-radius:20px;
  border:1px solid #ccc;
}

/* MOBILE INPUT */
#messageInput {
  padding:14px;
  font-size:18px;
}

/* DESKTOP INPUT */
@media (min-width:768px){
  #messageInput {
    padding:10px;
    font-size:14px;
  }
}

/* VIDEO FULLSCREEN */
#videoScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  z-index:100;
}

/* REMOTE VIDEO */
#remoteVideo {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOCAL VIDEO */
#localVideo {
  position:absolute;
  bottom:100px;
  right:10px;
  border:2px solid white;
}

/* MOBILE VIDEO SIZE */
#localVideo {
  width:140px;
  height:180px;
}

/* DESKTOP VIDEO SIZE */
@media (min-width:768px){
  #localVideo {
    width:180px;
    height:220px;
  }
}

/* INCOMING CALL POPUP */
#incomingCall {
  display:none;
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  z-index:200;
}

/* MOBILE POPUP */
#incomingCall {
  width:80%;
  font-size:18px;
}

/* DESKTOP POPUP */
@media (min-width:768px){
  #incomingCall {
    width:300px;
    font-size:14px;
  }
}

  /* CALL CONTROLS */
#callControls {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}

/* BUTTON STYLE */
.controlBtn {
  background:rgba(255,255,255,0.2);
  border:none;
  border-radius:50%;
  padding:15px;
  font-size:20px;
  color:white;
}

/* END CALL BUTTON */
.endBtn {
  background:red;
  border:none;
  border-radius:50%;
  padding:18px;
  font-size:22px;
  color:white;
}
  
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <h2>Enter</h2>

  <input 
    id="codeInput"
    type="password"
    placeholder="Input code"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
  >

  <br><br>

  <button onclick="login()">Enter</button>
</div>

<!-- CHAT -->
<div id="chat">

<div id="header">
  <span id="username"></span>
  <span id="status"></span>
</div>

<div id="callBar">
  <button onclick="startCall('audio')">📞 Voice</button>
  <button onclick="startCall('video')">🎥 Video</button>
</div>

<div id="messages"></div>

<div id="inputArea">
  <input id="messageInput" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>

</div>

<!-- INCOMING CALL -->
<div id="incomingCall">
  <p id="callerText"></p>
  <button onclick="acceptCall()">Accept</button>
  <button onclick="rejectCall()">Reject</button>
</div>

<!-- VIDEO -->
<div id="videoScreen">
  <video id="remoteVideo" autoplay></video>
  <video id="localVideo" autoplay muted></video>

  <div id="callControls">
    <button class="controlBtn" onclick="toggleMute()">🔇</button>
    <button class="controlBtn" onclick="toggleCamera()">🎥</button>
    <button class="endBtn" onclick="endCall()">🔴</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const SECRET_CODES = {
  "2213": "Tumaji",
  "1323": "Rani"
};

let socket;
let username;
let peer, localStream;
let callType;
let incomingOffer;

/* LOGIN */
function login(){

  const code = document.getElementById("codeInput").value.trim();

  if(!SECRET_CODES[code]) return;

  username = SECRET_CODES[code];

  socket = io();

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("chat").style.display="flex";

  document.getElementById("username").innerText=username;

  socket.emit("user joined", username);

  initSocketEvents();
}

/* SOCKET EVENTS */
function initSocketEvents(){

  socket.on("chat message", msg=>{
    addMessage(msg);
    socket.emit("message seen", msg.id);
  });

  socket.on("message seen", id=>{
    let el=document.getElementById("tick-"+id);
    if(el) el.innerText="✔✔";
  });

  socket.on("online users", users=>{
    let other = users.find(u=>u!==username);
    status.innerText = other ? other+" ● Online" : "Offline";
  });

  socket.on("incoming-call", data=>{
    callType = data.type;
    incomingOffer = data.offer;

    callerText.innerText = data.from+" calling";
    incomingCall.style.display="block";
  });

  socket.on("call-answered", async answer=>{
    await peer.setRemoteDescription(answer);
  });

  socket.on("call-rejected", ()=>{
    alert("Call rejected");
  });

  socket.on("ice-candidate", async candidate=>{
    if(peer) await peer.addIceCandidate(candidate);
  });
}

/* CHAT */
function sendMessage(){
  let text = messageInput.value.trim();
  if(!text) return;

  socket.emit("chat message",{user:username,text});
  messageInput.value="";
}

messageInput.addEventListener("keypress",e=>{
  if(e.key==="Enter") sendMessage();
});

function addMessage(msg){

  let div=document.createElement("div");

  div.style.padding="10px";
  div.style.margin="5px";
  div.style.borderRadius="10px";
  div.style.maxWidth="70%";

  if(msg.user===username){
    div.style.background="#dcf8c6";
    div.style.marginLeft="auto";
  } else {
    div.style.background="white";
  }

  let time=new Date(msg.time).toLocaleString();

  div.innerHTML = `
    ${msg.text}
    <div style="font-size:12px;color:gray;text-align:right;">
      ${time} <span id="tick-${msg.id}">${msg.user===username?"✔":""}</span>
    </div>
  `;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* CALL */
async function startCall(type){

  callType = type;

  if(type==="video"){
    localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  } else {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }

  createPeer();

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  let offer = await peer.createOffer();
  await peer.setLocalDescription(offer);

  socket.emit("call-user",{offer,type});

  showVideo();
}

function acceptCall(){
  incomingCall.style.display="none";
  startAnswer();
}

async function startAnswer(){

  if(callType==="video"){
    localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  } else {
    localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  }

  createPeer();

  localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

  await peer.setRemoteDescription(incomingOffer);

  let answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);

  socket.emit("call-accepted",{answer});

  showVideo();
}

function rejectCall(){
  incomingCall.style.display="none";
  socket.emit("call-rejected");
}

function createPeer(){

  peer = new RTCPeerConnection({
    iceServers: [

      // STUN (existing)
      { urls: "stun:stun.l.google.com:19302" },

      // ✅ FREE TURN SERVER
      {
        urls: "turn:openrelay.metered.ca:80",
        username: "openrelayproject",
        credential: "openrelayproject"
      },
      {
        urls: "turn:openrelay.metered.ca:443",
        username: "openrelayproject",
        credential: "openrelayproject"
      }

    ]
  });

  peer.ontrack = e=>{
    remoteVideo.srcObject = e.streams[0];
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      socket.emit("ice-candidate",{candidate:e.candidate});
    }
  };
}
  

function showVideo(){
  videoScreen.style.display="block";
  if(localStream) localVideo.srcObject=localStream;
}

function endCall(){
  if(peer) peer.close();
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  videoScreen.style.display="none";
}

</script>

</body>
</html>
