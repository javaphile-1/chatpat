<!DOCTYPE html>
<html>

<head>
<title>Private Chat</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#loginScreen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

#chatScreen {
  display: none;
  flex-direction: column;
  height: 100vh;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.message {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  max-width: 70%;
}

.myMessage {
  background: lightgreen;
  align-self: flex-end;
}

.otherMessage {
  background: lightgray;
}

.seen {
  font-size: 10px;
  color: gray;
}

#inputArea {
  display: flex;
}

#messageInput {
  flex: 1;
  padding: 10px;
}

</style>

</head>

<body>

<div id="loginScreen">
  <h2>Login</h2>
  <input id="nameInput" placeholder="Enter your name"><br><br>
  <input id="codeInput" placeholder="Enter code"><br><br>
  <button onclick="login()">Enter</button>
  <p id="error"></p>
</div>

<div id="chatScreen">
  <h2>Chat</h2>
  <div id="messages"></div>

  <div id="inputArea">
    <input id="messageInput" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const SECRET_CODE = "8421";
let socket;
let username;

function login() {
  const code = document.getElementById("codeInput").value;
  const name = document.getElementById("nameInput").value;

  if (code !== SECRET_CODE) {
    document.getElementById("error").innerText = "Wrong code";
    return;
  }

  username = name;

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("chatScreen").style.display = "flex";

  startChat();
}

function startChat() {
  socket = io();

  const messagesDiv = document.getElementById("messages");

  socket.emit("user joined", username);

  // Load old messages
  socket.on("load messages", (msgs) => {
    msgs.forEach(addMessage);
  });

  // Receive new messages
  socket.on("chat message", (msg) => {
    addMessage(msg);

    // Send seen event
    socket.emit("message seen", msg.id);
  });

  // Show seen status
  socket.on("message seen", (id) => {
    const el = document.getElementById("seen-" + id);
    if (el) {
      el.innerText = "Seen";
    }
  });
}

function sendMessage() {
  const input = document.getElementById("messageInput");

  const msg = {
    user: username,
    text: input.value
  };

  socket.emit("chat message", msg);

  input.value = "";
}

function addMessage(msg) {
  const messagesDiv = document.getElementById("messages");

  const div = document.createElement("div");
  div.classList.add("message");

  if (msg.user === username) {
    div.classList.add("myMessage");
  } else {
    div.classList.add("otherMessage");
  }

  div.innerHTML = `
    ${msg.user}: ${msg.text}
    <div class="seen" id="seen-${msg.id}"></div>
  `;

  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

</script>

</body>
</html>
